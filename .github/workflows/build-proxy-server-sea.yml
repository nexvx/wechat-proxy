name: Build Proxy Server SEA

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.target.name }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: linux-x64
            runner: ubuntu-24.04
            artifact_name: wechat-proxy-linux-x64
            binary_name: wechat-proxy
          - name: macos-arm64
            runner: macos-15
            artifact_name: wechat-proxy-macos-arm64
            binary_name: wechat-proxy
          - name: windows-x64
            runner: windows-2022
            artifact_name: wechat-proxy-windows-x64
            binary_name: wechat-proxy.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25.8.0

      - name: Install dependencies
        run: npm install

      - name: Build single executable
        run: npm run build:proxy-server:sea

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp "dist/${{ matrix.target.binary_name }}" "artifacts/${{ matrix.target.binary_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.artifact_name }}
          path: artifacts/${{ matrix.target.binary_name }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Prepare release files
        run: |
          mkdir -p dist
          cp release-assets/wechat-proxy-linux-x64/wechat-proxy dist/wechat-proxy-linux-x64
          cp release-assets/wechat-proxy-macos-arm64/wechat-proxy dist/wechat-proxy-macos-arm64
          cp release-assets/wechat-proxy-windows-x64/wechat-proxy.exe dist/wechat-proxy-windows-x64.exe

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..${TAG}" --pretty=format:"- %s (%h)" --no-merges)
          else
            LOG=$(git log "${TAG}" --pretty=format:"- %s (%h)" --no-merges)
          fi
          {
            echo "body<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$LOG"
            echo ""
            echo "## Downloads"
            echo ""
            echo "| Platform | File |"
            echo "|----------|------|"
            echo "| Linux x64 | \`wechat-proxy-linux-x64\` |"
            echo "| macOS arm64 | \`wechat-proxy-macos-arm64\` |"
            echo "| Windows x64 | \`wechat-proxy-windows-x64.exe\` |"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            dist/wechat-proxy-linux-x64
            dist/wechat-proxy-macos-arm64
            dist/wechat-proxy-windows-x64.exe
